name: vidyaniketan_app
description: A full-stack educational app for student/parent engagement.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.6
  dio: ^5.9.2
  image_picker: ^1.1.2
  font_awesome_flutter: ^11.0.0
  hive_flutter: ^1.1.0
  fl_chart: ^0.69.0
  path_provider: ^2.1.4
  open_filex: ^4.5.0
  # firebase_core: ^2.18.0
  # firebase_messaging: ^14.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: assets/images/logo.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
